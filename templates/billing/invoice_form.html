{% extends "base.html" %}

{% block title %}Create Invoice{% endblock %}
{% block page_heading %}Create Invoice{% endblock %}
{% block breadcrumb_active %}Billing / Invoices / Create{% endblock %}

{% block content %}
  <div class="card h-100 p-0 radius-12">
    <div class="card-body p-24">
      <form method="post" class="row gy-4">
        {% csrf_token %}
        <div class="col-md-6">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">School <span class="text-danger-600">*</span></label>
          <select name="school_id" class="form-control radius-8 form-select" required>
            <option value="" selected disabled>Select school</option>
            {% for school in schools %}
              <option value="{{ school.id }}">{{ school.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">Plan <span class="text-danger-600">*</span></label>
          <select name="plan_id" class="form-control radius-8 form-select" required>
            <option value="" selected disabled>Select plan</option>
            {% for plan in plans %}
              <option value="{{ plan.id }}">{{ plan.name }} ({{ plan.code }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">Period Start <span class="text-danger-600">*</span></label>
          <input type="date" name="period_start" class="form-control radius-8" required value="{{ today|date:'Y-m-d' }}">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">Period End <span class="text-danger-600">*</span></label>
          <input type="date" name="period_end" class="form-control radius-8" required value="{{ today|date:'Y-m-d' }}">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">Due Date</label>
          <input type="date" name="due_date" class="form-control radius-8">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">Amount (Rs)</label>
          <input type="number" step="0.01" name="amount" class="form-control radius-8" value="0">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">Tax % (GST)</label>
          <input type="number" step="0.01" name="tax_percent" class="form-control radius-8" value="0">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">Coupon Code</label>
          <input type="text" name="coupon_code" class="form-control radius-8" placeholder="Optional">
          <div class="text-secondary-light text-sm mt-1">Leave blank for no discount.</div>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold text-primary-light text-sm mb-8">Status</label>
          <select name="status" class="form-control radius-8 form-select">
            {% for value,label in status_choices %}
              <option value="{{ value }}" {% if value == "ISSUED" %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 mt-32 d-flex gap-16">
          <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
            <iconify-icon icon="ri:file-list-3-line"></iconify-icon> Create Invoice
          </button>
          <a href="/billing/invoices/" class="btn btn-outline-secondary d-flex align-items-center gap-2">
            <iconify-icon icon="ri:close-line"></iconify-icon> Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
