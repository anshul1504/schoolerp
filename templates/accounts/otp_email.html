<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f5f7fb;font-family:Roboto,sans-serif;color:#0b1220;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="520" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e2e8f0;">
            <tr>
              <td style="padding:18px 20px;background:#0b1220;color:#ffffff;">
                <div style="font-size:16px;font-weight:800;">SchoolFlow</div>
                <div style="margin-top:4px;font-size:12px;opacity:0.85;">Login Verification</div>
              </td>
            </tr>
            <tr>
              <td style="padding:20px;">
                <p style="margin:0 0 10px 0;color:#334155;">Hello <strong>{{ user.get_full_name|default:user.username }}</strong>,</p>
                <p style="margin:0 0 16px 0;color:#475569;">Your verification code is:</p>
                <div style="font-size:28px;letter-spacing:6px;font-weight:800;color:#0b1220;padding:14px 16px;border-radius:12px;background:rgba(42,167,255,0.10);text-align:center;">
                  {{ code }}
                </div>
                <p style="margin:16px 0 0 0;color:#64748b;font-size:12px;">Expires in 10 minutes.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
